<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>ARGO · install</title>
<style>
:root{--bg:#0e1116;--card:#181d25;--fg:#e6edf3;--mut:#8b949e;--acc:#4fd1c5;--bd:#222}
@media(prefers-color-scheme:light){:root{--bg:#f6f8fa;--card:#fff;--fg:#1f2328;--mut:#59636e;--acc:#1f9e94;--bd:#d0d7de}}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,Arial;background:var(--bg);color:var(--fg);line-height:1.5}
.wrap{max-width:560px;margin:0 auto;padding:24px 20px}
.top{display:flex;align-items:center;gap:12px}
h1{font-size:22px;display:flex;align-items:center;gap:12px;margin:0}
.mut{color:var(--mut)}.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-top:18px}
ol{padding-left:20px;margin:8px 0}li{margin:4px 0}
.warn{border-left:3px solid var(--acc);padding:8px 12px;background:rgba(79,209,197,.08);border-radius:8px;font-size:14px}
a{color:var(--acc)}code{background:var(--bd);padding:1px 5px;border-radius:5px}
.btnrow{margin-top:16px;text-align:center}
esp-web-install-button{--esp-tools-button-color:#04211e;--esp-tools-button-background-color:var(--acc)}
.langsel{position:relative;margin-left:auto}
.langbtn{display:flex;align-items:center;gap:8px;background:var(--card);color:var(--fg);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px}
.flag{width:20px;height:14px;border-radius:3px;border:1px solid rgba(128,128,128,.45);flex:0 0 auto;display:inline-block}
.langmenu{position:absolute;right:0;top:112%;background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:4px;min-width:170px;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;z-index:10;max-height:60vh;overflow:auto}
.langmenu.open{display:block}
.langmenu button{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:0;color:var(--fg);padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;text-align:left}
.langmenu button:hover{background:var(--bd)}
</style>
</head>
<body><div class="wrap">
<div class="top">
<h1><svg width="34" height="22" viewBox="0 0 30 20"><rect x="1" y="3" width="24" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="26" y="7.5" width="3" height="5" rx="1" fill="currentColor"/><rect x="4" y="6" width="5" height="8" fill="var(--acc)"/><rect x="10.5" y="6" width="5" height="8" fill="var(--acc)"/></svg> ARGO</h1>
<div class="langsel">
<button class="langbtn" id="langbtn"><span class="flag" id="curflag"></span><span id="curname">English</span><span aria-hidden="true">▾</span></button>
<div class="langmenu" id="langmenu"></div>
</div>
</div>
<div class="mut" id="subtitle" style="margin-top:8px"></div>

<div class="card">
<b id="h_install"></b>
<ol><li id="step1"></li><li id="step2"></li><li id="step3"></li></ol>
<div class="btnrow">
<esp-web-install-button manifest="manifest.json">
  <button slot="activate" id="btn"></button>
  <span slot="unsupported" id="unsupported"></span>
  <span slot="not-allowed" id="notallowed"></span>
</esp-web-install-button>
</div>
</div>

<div class="card">
<b id="h_after"></b>
<div class="mut" id="after" style="margin-top:6px"></div>
</div>

<div class="card warn" id="warn"></div>
<div class="mut" id="footer" style="margin-top:18px;font-size:13px"></div>
</div>

<script>
const LANGS=[

 {c:'es',n:'Español',   f:'linear-gradient(180deg,#AA151B 25%,#F1BF00 25% 75%,#AA151B 75%)'},

const T={

 pt:{subtitle:"Firmware para um ESP32-S3 que lê um BMS JK (série PB) e o mostra no Home Assistant, numa página web e num OLED.",h_install:"Instalar pelo navegador",step1:"Use Chrome, Edge ou Opera no computador (Windows / macOS / Linux). Firefox, Safari e telemóveis não são suportados.",step2:"Ligue a placa ESP32-S3 ao computador por USB.",step3:"Carregue em Instalar, escolha a porta série e aguarde.",btn:"Instalar",unsupported:"Navegador não suportado — use Chrome, Edge ou Opera no computador.",notallowed:"É necessário HTTPS.",h_after:"Depois da instalação",after:"No primeiro arranque não há nenhuma rede WiFi guardada: a placa cria uma rede <code>ARGO-setup</code>. Ligue o telemóvel ou PC, abra <code>192.168.4.1</code> e escolha a sua rede. ARGO fica acessível pela web (<code>http://&lt;ip&gt;/</code>).",warn:"O firmware público não contém credenciais. O WiFi e o MQTT/Home Assistant configuram-se depois, no dispositivo.",footer:"ARGO — by GioTzu · MIT"},

};
const $=i=>document.getElementById(i);
const TXT=['subtitle','h_install','step1','step2','step3','btn','unsupported','notallowed','h_after','warn','footer'];
function render(code){
 const t=T[code]||T.en; document.documentElement.lang=code;
 TXT.forEach(k=>{const e=$(k); if(e&&t[k]!=null) e.textContent=t[k];});
 $('after').innerHTML=t.after;
 const lg=LANGS.find(x=>x.c===code)||LANGS[0];
 $('curname').textContent=lg.n; $('curflag').style.background=lg.f;
 try{localStorage.argo_lang=code;}catch(e){}
}
function buildMenu(){
 const m=$('langmenu'); m.innerHTML='';
 LANGS.forEach(x=>{const b=document.createElement('button');
  const fl=document.createElement('span'); fl.className='flag'; fl.style.background=x.f;
  const nm=document.createElement('span'); nm.textContent=x.n;
  b.appendChild(fl); b.appendChild(nm);
  b.onclick=()=>{render(x.c); m.classList.remove('open');};
  m.appendChild(b);});
}
$('langbtn').onclick=(e)=>{e.stopPropagation();$('langmenu').classList.toggle('open');};
document.addEventListener('click',()=>$('langmenu').classList.remove('open'));
buildMenu();
let L='en'; try{ if(localStorage.argo_lang && T[localStorage.argo_lang]) L=localStorage.argo_lang; }catch(e){}
render(L);
</script>
<script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
</body>
</html>
